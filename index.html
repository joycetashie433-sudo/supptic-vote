<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPPTIC BUEA 2026 - Vote</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0a0f1e, #0d1525);
  color: white;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-radius: 20px;
  margin-bottom: 30px;
}
.header h1 { color: #D4AF37; font-size: 2rem; }
.stats { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
.stat { text-align: center; }
.stat-value { font-size: 2rem; font-weight: bold; color: #D4AF37; }
.candidates-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 20px;
}
.candidate-card {
  background: rgba(0,0,0,0.4);
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid rgba(212,175,55,0.3);
}
.candidate-photo { width: 100%; height: 200px; object-fit: cover; background: #1a1a2e; }
.candidate-info { padding: 15px; }
.candidate-name { font-size: 1.1rem; font-weight: bold; }
.candidate-role { color: #D4AF37; margin: 5px 0; }
.vote-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #D4AF37, #A8880E);
  border: none;
  border-radius: 10px;
  color: #1a1a2e;
  font-weight: bold;
  cursor: pointer;
}
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-content {
  background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
  border-radius: 20px;
  padding: 30px;
  max-width: 500px;
  width: 90%;
  border: 2px solid #D4AF37;
}
.payment-info {
  background: rgba(212,175,55,0.1);
  border-radius: 15px;
  padding: 20px;
  margin: 20px 0;
  text-align: center;
}
.mtn-number { color: #FFD700; font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
.orange-number { color: #FF6600; font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
.phone-input {
  width: 100%;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border: 1px solid #D4AF37;
  border-radius: 10px;
  color: white;
  font-size: 1rem;
  margin: 15px 0;
}
.confirm-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #D4AF37, #A8880E);
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
}
.close-btn { background: rgba(255,255,255,0.1); color: white; margin-top: 10px; }
.ranking {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  margin-top: 30px;
}
.ranking h3 { color: #D4AF37; margin-bottom: 15px; }
.ranking-item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.ranking-votes { color: #D4AF37; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🏆 SUPPTIC BUEA 2026 🏆</h1>
    <p>Votez pour vos candidats préférés</p>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="totalVotes">0</div><div class="stat-label">Votes</div></div>
      <div class="stat"><div class="stat-value" id="totalVoters">0</div><div class="stat-label">Votants</div></div>
    </div>
  </div>

  <div class="candidates-grid" id="candidatesGrid"></div>

  <div class="ranking">
    <h3>📊 Classement</h3>
    <div id="rankingList"></div>
  </div>
</div>

<div id="voteModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Voter</h3>
    
    <div class="payment-info">
      <h4>💰 Envoyez 100 FCFA sur :</h4>
      <div class="mtn-number">🟡 MTN: <strong>675 134 608</strong></div>
      <div class="orange-number">🟠 ORANGE: <strong>657 547 901</strong></div>
      <p style="margin-top: 15px;">✅ Après paiement, entrez votre numéro ci-dessous</p>
    </div>
    
    <input type="tel" id="phoneNumber" class="phone-input" placeholder="Votre numéro (ex: 677777777)" maxlength="9">
    
    <button class="confirm-btn" onclick="confirmVote()">✅ Valider mon vote</button>
    <button class="confirm-btn close-btn" onclick="closeModal()">❌ Annuler</button>
  </div>
</div>

<script>
const CANDIDATES = [
  { id: 1, name: "MONDE RAMSEL", role: "MASTER", photo: "IMG-20260509-WA0011.jpg" },
  { id: 2, name: "MVOGO EBODE DANIEL", role: "MASTER", photo: "IMG-20260509-WA0012.jpg" },
  { id: 3, name: "YOUSSOUFA MOUSSA", role: "MASTER", photo: "IMG-20260511-WA0032.jpg" },
  { id: 4, name: "MANTHO INGRID", role: "MISSE", photo: "IMG-20260509-WA0016.jpg" },
  { id: 5, name: "MAAGANG NYOTCHOBIA ISMAILA PAMELA", role: "MISSE", photo: "SMAILA.jpg" },
  { id: 6, name: "JEANS CALYNE", role: "MISSE", photo: "JEANS.jpg" }
];

let votes = {};
let voters = [];

function loadVotes() {
  const saved = localStorage.getItem('votes');
  if (saved) votes = JSON.parse(saved);
  else CANDIDATES.forEach(c => votes[c.id] = 0);
  const savedVoters = localStorage.getItem('voters');
  if (savedVoters) voters = JSON.parse(savedVoters);
}

function saveVotes() {
  localStorage.setItem('votes', JSON.stringify(votes));
  localStorage.setItem('voters', JSON.stringify(voters));
}

function displayCandidates() {
  const grid = document.getElementById('candidatesGrid');
  grid.innerHTML = '';
  CANDIDATES.forEach(candidate => {
    const card = document.createElement('div');
    card.className = 'candidate-card';
    card.innerHTML = `
      <div class="candidate-photo">
        <img src="${candidate.photo}" style="width:100%; height:100%; object-fit:cover;" onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;\'>👤</div>'">
      </div>
      <div class="candidate-info">
        <div class="candidate-name">${candidate.name}</div>
        <div class="candidate-role">${candidate.role}</div>
        <button class="vote-btn" onclick="openModal(${candidate.id})">🗳️ Voter - 100 FCFA</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function displayRanking() {
  const rankingList = document.getElementById('rankingList');
  const sorted = [...CANDIDATES].sort((a,b) => (votes[b.id] || 0) - (votes[a.id] || 0));
  rankingList.innerHTML = '';
  sorted.forEach((candidate, index) => {
    const medal = index === 0 ? '🥇 ' : index === 1 ? '🥈 ' : index === 2 ? '🥉 ' : '';
    const item = document.createElement('div');
    item.className = 'ranking-item';
    item.innerHTML = `<div><span style="font-size:1.2rem;">${medal}</span> ${candidate.name}</div><div class="ranking-votes">${votes[candidate.id] || 0} votes</div>`;
    rankingList.appendChild(item);
  });
  const total = Object.values(votes).reduce((a,b) => a+b, 0);
  document.getElementById('totalVotes').textContent = total;
  document.getElementById('totalVoters').textContent = voters.length;
}

let currentCandidateId = null;

function openModal(candidateId) {
  currentCandidateId = candidateId;
  const candidate = CANDIDATES.find(c => c.id === candidateId);
  document.getElementById('modalTitle').innerHTML = `🗳️ Voter pour ${candidate.name}`;
  document.getElementById('voteModal').style.display = 'flex';
  document.getElementById('phoneNumber').value = '';
}

function closeModal() {
  document.getElementById('voteModal').style.display = 'none';
}

function confirmVote() {
  const phone = document.getElementById('phoneNumber').value.replace(/\D/g, '');
  if (phone.length < 9) {
    alert('❌ Entrez un numéro valide (ex: 677777777)');
    return;
  }
  if (voters.includes(phone)) {
    alert('❌ Ce numéro a déjà voté !');
    return;
  }
  
  votes[currentCandidateId]++;
  voters.push(phone);
  saveVotes();
  
  const candidate = CANDIDATES.find(c => c.id === currentCandidateId);
  alert(`✅ VOTE VALIDÉ !\n\n👑 ${candidate.name}\n📱 ${phone}\n💰 100 FCFA\n\nMerci d'avoir voté !`);
  
  closeModal();
  displayRanking();
}

loadVotes();
displayCandidates();
displayRanking();
</script>
</body>
</html>

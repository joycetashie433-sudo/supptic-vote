<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SUPPTIC BUEA 2026 - Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES ===== */
:root {
  --gold: #D4AF37;
  --gold-light: #F0D060;
  --gold-dark: #A8880E;
  --navy: #0A0F1E;
  --navy-card: #151D2E;
  --navy-up: #1C2640;
  --text1: #F5F0E8;
  --text2: #9CA3AF;
  --text3: #6B7280;
  --green: #10B981;
  --red: #EF4444;
  --blue: #3B82F6;
  --border: rgba(212,175,55,0.15);
  --border2: rgba(212,175,55,0.35);
  --r: 14px;
  --shadow: 0 20px 50px rgba(0,0,0,0.6);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--navy);
  color: var(--text1);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 4px; }

#canvas-bg {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}
#confetti-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 10000;
}

.page { position: relative; z-index: 1; }

.t-en { display: block; }
.t-fr { display: block; font-style: italic; color: var(--gold); opacity: 0.75; }
.sep  { color: var(--text3); margin: 0 5px; }
.hidden { display: none !important; }

#appPage { padding-bottom: 60px; }

.app-header {
  position: sticky; top: 0; z-index: 50;
  padding: 12px 20px;
  background: rgba(10,15,30,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.hdr-brand { display: flex; align-items: center; gap: 10px; }
.hdr-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.hdr-text .t-en { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--text1); }
.hdr-text .t-fr { font-size: 0.62rem; color: var(--text3); margin-top: 0; }

.help-btn {
  background: rgba(212,175,55,0.12); border: 1px solid var(--border2);
  border-radius: 50px; padding: 8px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; transition: all 0.2s;
}
.help-btn:hover { background: rgba(212,175,55,0.22); transform: scale(0.98); }
.help-menu {
  position: fixed; top: 0; right: -420px;
  width: 100%; max-width: 400px; height: 100vh;
  background: var(--navy-card); border-left: 2px solid var(--gold);
  z-index: 1000; transition: right 0.3s cubic-bezier(0.34,1.56,0.64,1);
  padding: 24px 20px; overflow-y: auto;
  box-shadow: -10px 0 40px rgba(0,0,0,0.5);
}
.help-menu.open { right: 0; }
.help-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border2);
}
.help-header h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.3rem; }
.close-help {
  width: 32px; height: 32px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
}
.help-section { margin-bottom: 28px; }
.help-section h4 { color: var(--gold); font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
.help-section p { font-size: 0.85rem; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
.help-step {
  background: var(--navy-up); border-radius: 12px; padding: 12px; margin-bottom: 10px;
  font-size: 0.8rem; border-left: 3px solid var(--gold);
}
.help-step strong { color: var(--gold); }
.overlay-help { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
.overlay-help.show { display: block; }

.dev-card {
  background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(212,175,55,0.02));
  border-radius: 12px; padding: 12px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px; border: 1px solid var(--border);
}
.dev-avatar { width: 48px; height: 48px; background: var(--navy-up); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid var(--gold-dark); }
.dev-info { flex: 1; }
.dev-name { font-weight: 700; color: var(--gold); font-size: 0.9rem; }
.dev-role { font-size: 0.65rem; color: var(--text3); margin-top: 2px; }
.whatsapp-btn {
  background: #25D366; border: none; border-radius: 30px; padding: 6px 12px;
  color: white; font-size: 0.7rem; font-weight: 600; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
}
.whatsapp-btn:hover { background: #128C7E; }

.app-body { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

.hero {
  background: linear-gradient(120deg, #0D1428 0%, #1a0830 50%, #0a1a10 100%);
  border: 1px solid var(--border2); border-radius: 22px; padding: 36px 24px;
  margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;
}
.hero-crown { font-size: 2.5rem; margin-bottom: 10px; display: block; animation: crownFloat 3s ease-in-out infinite; }
@keyframes crownFloat { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-7px) rotate(2deg); } }
.hero-title .t-en { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem,4vw,2rem); font-weight: 700; color: var(--text1); }
.hero-title .t-en em { color: var(--gold); font-style: italic; }
.hero-title .t-fr { font-family: 'Playfair Display', serif; font-size: 0.9rem; color: rgba(212,175,55,0.55); margin-top: 5px; }
.hero-sub .t-en { font-size: 0.85rem; color: var(--text2); }
.hero-sub .t-fr { font-size: 0.75rem; color: rgba(212,175,55,0.45); margin-top: 2px; }

.hero-stats { display: flex; justify-content: center; align-items: center; gap: 0; margin-top: 26px; flex-wrap: wrap; }
.stat-item { text-align: center; padding: 0 20px; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-en { font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }
.stat-fr { font-size: 0.62rem; color: rgba(212,175,55,0.4); font-style: italic; }
.stat-div { width: 1px; height: 40px; background: var(--border); }

.section-box { background: var(--navy-card); border: 1px solid var(--border); border-radius: 20px; padding: 22px 18px; margin-bottom: 20px; }

.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.sec-title { display: flex; align-items: center; gap: 10px; }
.sec-icon { width: 34px; height: 34px; background: rgba(212,175,55,0.1); border: 1px solid var(--border2); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.sec-label .t-en { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text1); }
.sec-label .t-fr { font-family: 'Playfair Display', serif; font-size: 0.75rem; color: rgba(212,175,55,0.5); margin-top: 2px; }

.btn-sm { padding: 8px 14px; background: transparent; border: 1px solid var(--border2); border-radius: 10px; color: var(--gold); cursor: pointer; }
.btn-sm:hover { background: rgba(212,175,55,0.08); }
.btn-reset { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); color: #FCA5A5; }
.btn-reset:hover { background: rgba(239,68,68,0.22); }

.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

.rc { background: var(--navy-up); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; text-align: center; transition: all 0.2s; position: relative; }
.rc:hover { transform: translateY(-2px); border-color: var(--border2); }
.rc.top1 { border-color: var(--gold); background: linear-gradient(155deg, rgba(212,175,55,0.12) 0%, var(--navy-up) 100%); }
.rc.top2 { border-color: #C0C0C0; background: linear-gradient(155deg, rgba(192,192,192,0.08) 0%, var(--navy-up) 100%); }
.rc.top3 { border-color: #CD7F32; background: linear-gradient(155deg, rgba(205,127,50,0.08) 0%, var(--navy-up) 100%); }
.medal { position: absolute; top: -8px; left: 8px; font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
.rc-photo { width: 56px; height: 56px; border-radius: 12px; margin: 0 auto 8px; overflow: hidden; border: 2px solid var(--border2); background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.04)); display: flex; align-items: center; justify-content: center; }
.rc-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.rc-photo .rc-fallback { font-size: 1.6rem; }
.rc-name { font-weight: 600; font-size: 0.85rem; color: var(--text1); }
.rc-role { font-size: 0.6rem; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin: 3px 0 10px; }
.rc-votes { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--gold); line-height: 1; }
.rc-pct { font-size: 0.7rem; color: var(--text3); margin: 3px 0 9px; }
.bar { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); border-radius: 4px; transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1); width: 0%; }

.phone-section {
  background: var(--navy-up);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 16px;
  margin: 14px 0;
}
.phone-label {
  font-size: 0.82rem;
  color: var(--text2);
  margin-bottom: 10px;
  font-weight: 600;
}
.phone-input-wrap {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--navy);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.phone-input-wrap:focus-within { border-color: var(--gold); }
.phone-prefix {
  padding: 12px 12px;
  background: rgba(212,175,55,0.08);
  color: var(--gold);
  font-weight: 700;
  font-size: 0.9rem;
  border-right: 1px solid var(--border2);
  white-space: nowrap;
}
.phone-input-wrap input {
  flex: 1;
  padding: 12px 14px;
  background: transparent;
  border: none;
  color: var(--text1);
  font-size: 1rem;
  font-family: 'Outfit', sans-serif;
  outline: none;
  letter-spacing: 1px;
}
.phone-input-wrap input::placeholder { color: var(--text3); }

.op-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  margin-top: 9px;
}
.op-mtn { background: rgba(255,204,0,0.15); border: 1px solid rgba(255,204,0,0.4); color: #FFE066; }
.op-orange { background: rgba(255,102,0,0.15); border: 1px solid rgba(255,102,0,0.4); color: #FFA366; }

.payment-info {
  background: rgba(212,175,55,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin: 12px 0;
  font-size: 0.78rem;
  color: var(--text2);
  line-height: 1.6;
}
.payment-info strong { color: var(--gold); }

.thankyou-card {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: linear-gradient(135deg, var(--navy-card), #1a0a2e);
  border: 2px solid var(--gold); border-radius: 28px;
  padding: 32px 28px; z-index: 1002;
  max-width: 400px; width: 90%; text-align: center;
  animation: thankyouPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
@keyframes thankyouPop {
  from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
.thankyou-card h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; margin-bottom: 15px; }
.thankyou-card .thankyou-icon { font-size: 4rem; margin-bottom: 15px; }
.thankyou-card p { color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.thankyou-card .candidate-name { color: var(--gold); font-weight: bold; font-size: 1.1rem; }
.thankyou-close {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border: none; border-radius: 30px; padding: 12px 24px;
  color: var(--navy); font-weight: bold; cursor: pointer; margin-top: 10px;
}

.sync-status {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 0.7rem; padding: 4px 10px; border-radius: 20px;
  background: rgba(0,0,0,0.3);
}
.sync-status.online { background: rgba(16,185,129,0.2); color: #6EE7B7; }
.sync-status.offline { background: rgba(239,68,68,0.2); color: #FCA5A5; }
.sync-dot-live { width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulse 1.5s infinite; }

.filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.tab-btn { padding: 7px 16px; background: transparent; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; }
.tab-btn.active { background: rgba(212,175,55,0.12); border-color: var(--gold-dark); }
.tab-btn.active .t-en, .tab-btn.active .t-fr { color: var(--gold); }

.cands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

.cand-card { background: var(--navy-up); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: all 0.2s; }
.cand-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.cand-photo-wrap { width: 100%; height: 200px; overflow: hidden; position: relative; background: linear-gradient(155deg, rgba(212,175,55,0.08), rgba(10,15,30,0.9)); }
.cand-photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; transition: transform 0.4s ease; }
.cand-card:hover .cand-photo-wrap img { transform: scale(1.04); }
.cand-photo-wrap .cand-no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
